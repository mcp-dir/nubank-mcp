# Smithery configuration for Nubank MCP
# Schema: https://smithery.ai/docs/build/project-config
# Remote HTTP MCP — server hosted at https://api.mcp.ai/p_nubank

name: nubank-mcp
displayName: "Nubank MCP"
description: >
  Conecte sua conta do **Nubank** ao Claude, ChatGPT e agentes de IA via Open Finance Brasil. Pergunte sobre saldos, extratos, faturas de cartão e investimentos do Nubank em linguagem natural. Regulado pelo Banco Central, somente leitura.

version: 0.1.0
license: MIT
homepage: https://github.com/mcp-dir/nubank-mcp
repository: https://github.com/mcp-dir/nubank-mcp

tags:
  - nubank
  - open-finance
  - open-banking
  - banking
  - brazil
  - finance
  - fintech
  - read-only

# Remote HTTP MCP — sem startCommand local (servidor já hospedado)
startCommand:
  type: http
  url: https://api.mcp.ai/p_nubank

auth:
  type: oauth2
  resourceMetadataUrl: https://api.mcp.ai/p_nubank/.well-known/oauth-protected-resource
  fallback:
    type: agent-auth
    description: >
      Para clientes sem OAuth 2.1. O agente expõe uma tool authenticate(token).
      Usuário gera o JWT em https://app.mcp.ai/agent-auth e cola no chat.
